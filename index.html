<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Ticket Booking</title>
    <link rel="stylesheet" href="book.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>🚌 Bus Ticket Booking</h1>
    </header>

    <!-- SLOT SELECTION -->
    <section id="slots">
        <h2>Select Your Seat</h2>
        <div class="seat-container">
            <div class="seat" onclick="selectSeat(this)">1</div>
            <div class="seat" onclick="selectSeat(this)">2</div>
            <div class="seat" onclick="selectSeat(this)">3</div>
            <div class="seat" onclick="selectSeat(this)">4</div>
        </div>
    </section>

    <!-- BOOKING FORM -->
    <section id="form-section" style="display:none;">
        <h2>Enter Details</h2>
        <form id="bookingForm">
            <input type="text" placeholder="Name" required><br>
            <input type="number" placeholder="Age" required><br>
            <input type="text" placeholder="Gender" required><br>
            <input type="email" placeholder="Email" required><br>
            <input type="text" placeholder="Phone Number" required><br>
            <button type="submit">Book Ticket</button>
        </form>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Ticket Booking App</p>
    </footer>

    <script src="book.js"></script>
</body>
</html>
