<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Booking</title>
    <link rel="stylesheet" href="book.css">
</head>
<body>

<header>
    <h1>🚌 Smart Bus Booking</h1>
</header>

<main>

    <!-- Seat Layout Card -->
    <div class="card">
        <h2>Select Your Seat</h2>
        <div class="seat-grid">
            <div class="seat" onclick="selectSeat(this)">1</div>
            <div class="seat" onclick="selectSeat(this)">2</div>
            <div class="seat" onclick="selectSeat(this)">3</div>
            <div class="seat" onclick="selectSeat(this)">4</div>
            <div class="seat" onclick="selectSeat(this)">5</div>
            <div class="seat" onclick="selectSeat(this)">6</div>
        </div>
    </div>

    <!-- Form Card -->
    <div class="card hidden" id="form-section">
        <h2>Passenger Details</h2>
        <form id="bookingForm">

            <div class="input-group">
                <input type="text" required>
                <label>Name</label>
            </div>

            <div class="input-group">
                <input type="number" required>
                <label>Age</label>
            </div>

            <div class="input-group">
                <input type="text" required>
                <label>Gender</label>
            </div>

            <div class="input-group">
                <input type="email" required>
                <label>Email</label>
            </div>

            <div class="input-group">
                <input type="text" required>
                <label>Phone</label>
            </div>

            <button type="submit">Confirm Booking</button>
        </form>
    </div>

</main>

<footer>
    <p>© 2026 Smart Booking System</p>
</footer>

<script src="book.js"></script>
</body>
</html>
